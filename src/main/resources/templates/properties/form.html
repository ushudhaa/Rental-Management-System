<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${isEdit} ? 'Edit Property' : 'New Property')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="container">
  <h1 th:text="${isEdit} ? 'Edit Property' : 'Add New Property'"></h1>

  <form th:action="${isEdit} ? @{/properties/{id}(id=${propertyId})} : @{/properties}"
        th:object="${propertyRequest}" method="post" class="form-card">

    <label>Title</label>
    <input type="text" th:field="*{title}" required>

    <label>Description</label>
    <textarea th:field="*{description}"></textarea>

    <label>Address</label>
    <input type="text" th:field="*{address}" required>

    <div class="form-row">
      <div>
        <label>City</label>
        <input type="text" th:field="*{city}" required>
      </div>
      <div>
        <label>State</label>
        <input type="text" th:field="*{state}">
      </div>
      <div>
        <label>Zip Code</label>
        <input type="text" th:field="*{zipCode}">
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>Type</label>
        <select th:field="*{type}">
          <option th:each="t : ${T(com.example.RentalManagementSystem.enums.PropertyType).values()}"
                  th:value="${t}" th:text="${t}"></option>
        </select>
      </div>
      <div>
        <label>Status</label>
        <select th:field="*{status}">
          <option th:each="s : ${T(com.example.RentalManagementSystem.enums.PropertyStatus).values()}"
                  th:value="${s}" th:text="${s}"></option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>Rent Amount</label>
        <input type="number" step="0.01" th:field="*{rentAmount}" required>
      </div>
      <div>
        <label>Bedrooms</label>
        <input type="number" th:field="*{bedrooms}">
      </div>
      <div>
        <label>Bathrooms</label>
        <input type="number" th:field="*{bathrooms}">
      </div>
      <div>
        <label>Area (sqft)</label>
        <input type="number" step="0.01" th:field="*{areaSqft}">
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update' : 'Create'"></button>
      <a href="/properties" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</main>
</body>
</html>
