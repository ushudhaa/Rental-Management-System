<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${isEdit} ? 'Edit Payment' : 'New Payment')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="container">
    <h1 th:text="${isEdit} ? 'Edit Payment' : 'Add New Payment'"></h1>

    <form th:action="${isEdit} ? @{/payments/{id}(id=${paymentId})} : @{/payments}"
          th:object="${paymentRequest}" method="post" class="form-card">

        <label>Property</label>
        <select th:field="*{propertyId}" required>
            <option th:each="p : ${properties}" th:value="${p.id}" th:text="${p.title} + ' (' + ${p.city} + ')'"></option>
        </select>

        <label>Tenant Name</label>
        <input type="text" th:field="*{tenantName}" required>

        <div class="form-row">
            <div>
                <label>Amount</label>
                <input type="number" step="0.01" th:field="*{amount}" required>
            </div>
            <div>
                <label>Due Date</label>
                <input type="date" th:field="*{dueDate}" required>
            </div>
            <div>
                <label>Payment Date</label>
                <input type="date" th:field="*{paymentDate}">
            </div>
        </div>

        <div class="form-row">
            <div>
                <label>Payment Method</label>
                <select th:field="*{paymentMethod}">
                    <option value="">-- none --</option>
                    <option th:each="m : ${T(com.example.RentalManagementSystem.enums.PaymentMethod).values()}"
                            th:value="${m}" th:text="${m}"></option>
                </select>
            </div>
            <div>
                <label>Status</label>
                <select th:field="*{status}">
                    <option th:each="s : ${T(com.example.RentalManagementSystem.enums.PaymentStatus).values()}"
                            th:value="${s}" th:text="${s}"></option>
                </select>
            </div>
        </div>

        <label>Reference Number</label>
        <input type="text" th:field="*{referenceNumber}">

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update' : 'Create'"></button>
            <a href="/payments" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
